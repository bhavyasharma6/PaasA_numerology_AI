<!DOCTYPE html>
<!--
  dashboard.html - PaasA Numerology AI Results Dashboard
  Author: Bhavya Sharma | Enrollment: 2450850380 | MCSP-232

<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PaasA – Your Cosmic Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/style.css"/>
  <style>
    /* ── Dashboard-specific enhancements ── */
    .dash-wrapper {
      padding-top: 75px;
      min-height: 100vh;
    }

    /* Hero strip */
    .dash-hero {
      background: linear-gradient(135deg,
        rgba(155,89,182,0.18) 0%,
        rgba(255,215,0,0.08) 50%,
        rgba(0,229,255,0.12) 100%);
      border-bottom: 1px solid rgba(255,215,0,0.15);
      padding: 1.4rem 2rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .dash-greeting {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      color: var(--color-accent-gold);
      text-shadow: 0 0 30px rgba(255,215,0,0.4);
    }

    .dash-greeting span {
      display: block;
      font-family: var(--font-body);
      font-size: 0.85rem;
      color: var(--color-text-muted);
      font-weight: 400;
      margin-top: 2px;
    }

    /* Tab bar */
    .tab-bar {
      display: flex;
      gap: 0;
      background: rgba(255,255,255,0.04);
      border-radius: 14px;
      padding: 5px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .tab-btn {
      background: none;
      border: none;
      color: var(--color-text-muted);
      font-family: var(--font-body);
      font-size: 0.88rem;
      font-weight: 500;
      padding: 0.5rem 1.2rem;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s ease;
      white-space: nowrap;
    }

    .tab-btn:hover { color: var(--color-text-primary); }

    .tab-btn.active {
      background: linear-gradient(135deg, rgba(155,89,182,0.5), rgba(255,215,0,0.2));
      color: var(--color-accent-gold);
      box-shadow: 0 2px 12px rgba(155,89,182,0.3);
    }

    .tab-content { display: none; animation: fadeIn 0.3s ease; }
    .tab-content.active { display: block; }

    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

    /* ── Lo Shu Grid tab ── */
    .grid-tab-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      padding: 2rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .loshu-panel {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,215,0,0.15);
      border-radius: 20px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .panel-title {
      font-family: var(--font-heading);
      font-size: 1rem;
      color: var(--color-accent-gold);
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
    }

    .loshu-grid {
      display: grid;
      grid-template-columns: repeat(3, 90px);
      grid-template-rows: repeat(3, 90px);
      gap: 8px;
    }

    .grid-cell {
      width: 90px; height: 90px;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .grid-cell.present {
      background: linear-gradient(135deg, rgba(255,215,0,0.12), rgba(155,89,182,0.15));
      border-color: rgba(255,215,0,0.4);
      box-shadow: 0 0 20px rgba(255,215,0,0.15), inset 0 0 20px rgba(255,215,0,0.05);
    }

    .grid-cell.present:hover {
      box-shadow: 0 0 30px rgba(255,215,0,0.3), inset 0 0 25px rgba(255,215,0,0.08);
      transform: scale(1.05);
    }

    .grid-cell.missing {
      opacity: 0.35;
      border-style: dashed;
    }

    .grid-cell .number {
      font-family: var(--font-heading);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--color-accent-gold);
      line-height: 1;
    }

    .grid-cell.missing .number { color: var(--color-text-muted); }

    .grid-cell .freq-badge {
      font-size: 0.65rem;
      background: rgba(255,215,0,0.2);
      color: var(--color-accent-gold);
      border-radius: 20px;
      padding: 1px 6px;
      margin-top: 4px;
      font-weight: 600;
    }

    /* Planes */
    .planes-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      width: 100%;
    }

    .plane-badge {
      border-radius: 12px;
      padding: 0.7rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid transparent;
      font-size: 0.82rem;
    }

    .plane-badge.strong {
      background: rgba(46,213,115,0.1);
      border-color: rgba(46,213,115,0.3);
      color: #2ed573;
    }

    .plane-badge.balanced {
      background: rgba(255,215,0,0.08);
      border-color: rgba(255,215,0,0.25);
      color: var(--color-accent-gold);
    }

    .plane-badge.weak {
      background: rgba(255,71,87,0.08);
      border-color: rgba(255,71,87,0.2);
      color: #ff4757;
    }

    .plane-name { font-weight: 600; }
    .plane-status { font-size: 0.72rem; opacity: 0.8; }

    /* Legend */
    .grid-legend {
      display: flex;
      gap: 1.5rem;
      margin-top: 1.2rem;
      font-size: 0.78rem;
      color: var(--color-text-muted);
    }

    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }

    /* ── Core Numbers tab ── */
    .numbers-tab-layout {
      padding: 2rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .numbers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.25rem;
      margin-bottom: 2rem;
    }

    .number-card {
      border-radius: 20px;
      padding: 1.75rem 1.5rem;
      text-align: center;
      border: 1px solid transparent;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .number-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      opacity: 0.07;
    }

    .number-card:hover { transform: translateY(-4px); }

    .number-card.gold {
      background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(184,134,11,0.05));
      border-color: rgba(255,215,0,0.3);
      box-shadow: 0 4px 24px rgba(255,215,0,0.1);
    }

    .number-card.purple {
      background: linear-gradient(135deg, rgba(155,89,182,0.15), rgba(100,13,173,0.05));
      border-color: rgba(155,89,182,0.35);
      box-shadow: 0 4px 24px rgba(155,89,182,0.12);
    }

    .number-card.cyan {
      background: linear-gradient(135deg, rgba(0,229,255,0.1), rgba(0,151,167,0.05));
      border-color: rgba(0,229,255,0.3);
      box-shadow: 0 4px 24px rgba(0,229,255,0.1);
    }

    .number-card.pink {
      background: linear-gradient(135deg, rgba(233,30,140,0.1), rgba(233,30,140,0.04));
      border-color: rgba(233,30,140,0.3);
      box-shadow: 0 4px 24px rgba(233,30,140,0.1);
    }

    .card-icon { font-size: 2rem; margin-bottom: 0.6rem; }

    .card-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--color-text-muted);
      margin-bottom: 0.3rem;
    }

    .card-name {
      font-family: var(--font-heading);
      font-size: 0.95rem;
      margin-bottom: 0.75rem;
    }

    .card-number {
      font-family: var(--font-heading);
      font-size: 3.5rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 0.75rem;
    }

    .card-desc {
      font-size: 0.8rem;
      color: var(--color-text-secondary);
      line-height: 1.5;
    }

    /* Insights panel */
    .insights-panel {
      background: linear-gradient(135deg, rgba(155,89,182,0.08), rgba(0,229,255,0.05));
      border: 1px solid rgba(155,89,182,0.2);
      border-radius: 20px;
      padding: 2rem;
    }

    .insights-title {
      font-family: var(--font-heading);
      font-size: 1.1rem;
      color: var(--color-accent-gold);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .insight-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .insight-item {
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      border-left: 3px solid var(--color-accent-gold);
    }

    .insight-item.purple { border-left-color: var(--color-accent-purple); }
    .insight-item.cyan   { border-left-color: var(--color-accent-cyan); }
    .insight-item.pink   { border-left-color: var(--color-accent-pink); }

    .insight-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-text-muted);
      margin-bottom: 0.4rem;
    }

    .insight-text {
      font-size: 0.88rem;
      color: var(--color-text-secondary);
      line-height: 1.55;
    }

    .affirmation-box {
      background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(155,89,182,0.08));
      border: 1px solid rgba(255,215,0,0.2);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      text-align: center;
      font-family: var(--font-heading);
      font-size: 0.95rem;
      color: var(--color-accent-gold);
      font-style: italic;
      margin-top: 1rem;
    }

    /* ── AI Chat tab ── */
    .chat-tab-layout {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 160px);
      max-width: 860px;
      margin: 0 auto;
      padding: 1.5rem 2rem;
      gap: 1rem;
    }

    .suggested-label {
      font-size: 0.75rem;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }

    .suggested-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.25rem;
    }

    .pill-btn {
      background: rgba(255,215,0,0.07);
      border: 1px solid rgba(255,215,0,0.25);
      color: var(--color-accent-gold);
      border-radius: 50px;
      padding: 0.35rem 0.9rem;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: var(--font-body);
    }

    .pill-btn:hover {
      background: rgba(255,215,0,0.15);
      border-color: rgba(255,215,0,0.5);
      transform: translateY(-1px);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding-right: 4px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,215,0,0.2) transparent;
    }

    .chat-bubble {
      max-width: 75%;
      padding: 0.9rem 1.2rem;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.6;
      animation: bubbleIn 0.25s ease;
    }

    @keyframes bubbleIn {
      from { opacity:0; transform: scale(0.95) translateY(8px); }
      to   { opacity:1; transform: scale(1)    translateY(0); }
    }

    .chat-bubble.user {
      align-self: flex-end;
      background: linear-gradient(135deg, rgba(155,89,182,0.55), rgba(100,13,173,0.4));
      border: 1px solid rgba(155,89,182,0.4);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .chat-bubble.assistant {
      align-self: flex-start;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,215,0,0.15);
      color: var(--color-text-secondary);
      border-bottom-left-radius: 4px;
    }

    .bubble-header {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      color: var(--color-accent-gold);
      margin-bottom: 0.4rem;
      font-weight: 600;
    }

    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0.75rem 1.2rem;
    }

    .typing-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--color-accent-gold);
      animation: typingBounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%            { transform: translateY(-7px); opacity: 1; }
    }

    .chat-input-row {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,215,0,0.2);
      border-radius: 16px;
      padding: 0.75rem 0.75rem 0.75rem 1.2rem;
      transition: border-color 0.2s ease;
    }

    .chat-input-row:focus-within {
      border-color: rgba(255,215,0,0.5);
      box-shadow: 0 0 20px rgba(255,215,0,0.08);
    }

    .chat-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--color-text-primary);
      font-family: var(--font-body);
      font-size: 0.9rem;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
    }

    .chat-input::placeholder { color: var(--color-text-muted); }

    .send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--color-accent-gold), #d4a017);
      color: #000;
      font-size: 1rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .send-btn:hover:not(:disabled) {
      transform: scale(1.1);
      box-shadow: 0 0 16px rgba(255,215,0,0.4);
    }

    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .chat-footer {
      text-align: center;
      font-size: 0.72rem;
      color: var(--color-text-muted);
    }

    /* Missing/present tags */
    .num-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 1rem; }
    .num-tag {
      padding: 0.25rem 0.65rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      font-family: var(--font-heading);
    }
    .num-tag.present { background: rgba(255,215,0,0.15); color: var(--color-accent-gold); border: 1px solid rgba(255,215,0,0.3); }
    .num-tag.missing { background: rgba(255,71,87,0.1); color: #ff6b7a; border: 1px solid rgba(255,71,87,0.2); }

    @media (max-width: 768px) {
      .grid-tab-layout { grid-template-columns: 1fr; padding: 1rem; }
      .loshu-grid { grid-template-columns: repeat(3, 75px); grid-template-rows: repeat(3, 75px); }
      .grid-cell { width: 75px; height: 75px; }
      .chat-tab-layout { padding: 1rem; height: calc(100vh - 180px); }
      .numbers-tab-layout { padding: 1rem; }
      .dash-hero { padding: 1rem; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a class="navbar-brand" href="/">PaasA <span>Numerology</span> AI</a>
    <ul class="navbar-links">
      <li><a href="/input">+ New Reading</a></li>
      <li><a href="/history">History</a></li>
    </ul>
  </nav>

  <div class="loading-overlay" id="loadingOverlay" style="display:none;">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Channelling cosmic energies...</div>
  </div>

  <div class="dash-wrapper">

    <!-- Hero strip -->
    <div class="dash-hero">
      <div class="dash-greeting" id="userGreeting">
        ✦ Your Cosmic Blueprint
        <span>Loading reading...</span>
      </div>

      <!-- Tab navigation -->
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="grid">⚡ Lo Shu Grid</button>
        <button class="tab-btn" data-tab="numbers">🔢 Core Numbers</button>
        <button class="tab-btn" data-tab="chat">🤖 AI Oracle</button>
      </div>
    </div>

    <!-- ═══ TAB: LO SHU GRID ═══ -->
    <div id="tab-grid" class="tab-content active">
      <div class="grid-tab-layout">

        <!-- Grid -->
        <div class="loshu-panel">
          <div class="panel-title">⚡ Lo Shu Grid</div>
          <div class="loshu-grid" id="loshuGrid">
            <!-- rendered by JS -->
          </div>
          <div class="grid-legend">
            <span><span class="legend-dot" style="background:rgba(255,215,0,0.7);"></span>Present</span>
            <span><span class="legend-dot" style="background:rgba(255,255,255,0.15); border:1px dashed #555;"></span>Missing</span>
          </div>
          <div style="margin-top:1.2rem; width:100%;">
            <div style="font-size:0.75rem; color:var(--color-text-muted); margin-bottom:0.6rem; text-transform:uppercase; letter-spacing:0.08em;">Numbers</div>
            <div class="num-tags" id="numTags"></div>
          </div>
        </div>

        <!-- Planes -->
        <div class="loshu-panel">
          <div class="panel-title">🧠 Plane Analysis</div>
          <div class="planes-grid" id="planesGrid">
            <!-- rendered by JS -->
          </div>
          <div style="margin-top:1.5rem; width:100%; background:rgba(255,255,255,0.03); border-radius:12px; padding:1rem;">
            <div style="font-size:0.72rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--color-text-muted); margin-bottom:0.6rem;">Strongest Plane</div>
            <div id="strongestPlane" style="font-family:var(--font-heading); color:var(--color-accent-gold); font-size:1rem;"></div>
          </div>
        </div>

      </div>
    </div>

    <!-- ═══ TAB: CORE NUMBERS ═══ -->
    <div id="tab-numbers" class="tab-content">
      <div class="numbers-tab-layout">

        <div class="numbers-grid" id="numbersGrid">
          <!-- rendered by JS -->
        </div>

        <div class="insights-panel" id="insightsPanel">
          <!-- rendered by JS -->
        </div>

      </div>
    </div>

    <!-- ═══ TAB: AI CHAT ═══ -->
    <div id="tab-chat" class="tab-content">
      <div class="chat-tab-layout">

        <!-- Suggested questions (pure HTML — no JS template literals) -->
        <div>
          <div class="suggested-label">✦ Try asking</div>
          <div class="suggested-pills">
            <button class="pill-btn" onclick="fillChat(this)">What does my Life Path number mean?</button>
            <button class="pill-btn" onclick="fillChat(this)">Which career suits my numbers?</button>
            <button class="pill-btn" onclick="fillChat(this)">What are my lucky colors?</button>
            <button class="pill-btn" onclick="fillChat(this)">How can I overcome my challenges?</button>
            <button class="pill-btn" onclick="fillChat(this)">What do my missing numbers indicate?</button>
          </div>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="chatMessages"></div>

        <!-- Input -->
        <div>
          <div class="chat-input-row">
            <textarea
              id="chatInput"
              class="chat-input"
              placeholder="Ask the cosmic oracle anything..."
              rows="1"
              maxlength="500"
            ></textarea>
            <button id="sendBtn" class="send-btn" disabled title="Send">➤</button>
          </div>
          <div class="chat-footer" style="margin-top:0.5rem;">
            Max 50 messages per day &nbsp;·&nbsp; Powered by Google Gemini 2.5 Flash
          </div>
        </div>

      </div>
    </div>

  </div><!-- end dash-wrapper -->

  <script>
    // Fill chat input from pill button
    function fillChat(btn) {
      const input = document.getElementById('chatInput');
      if (!input) return;
      input.value = btn.textContent.trim();
      input.dispatchEvent(new Event('input'));
      document.getElementById('sendBtn').disabled = false;
      input.focus();
    }
  </script>
  <script src="/static/app.js"></script>
</body>
</html>
